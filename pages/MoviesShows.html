<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie Player</title>
  <style>
    :root{
      --title1:#2f6fd6;
      --title2:#1d4ea6;
      --chrome1:#8cb0f3;
      --chrome2:#5f84cf;
      --chrome3:#3a62b0;
      --chrome4:#21458c;
      --text:#ffffff;
      --line:#0f2b5f;
    }

    *{box-sizing:border-box}

    html, body{
      width:100%;
      height:100%;
      margin:0;
    }

    body{
      display:grid;
      place-items:center;
      background:#1e2c55;
      font-family:Tahoma, Verdana, Arial, sans-serif;
      color:var(--text);
      overflow:hidden;
    }

    .player{
      width:min(96vw, 1600px);
      height:min(96vh, 1100px);
      background:linear-gradient(180deg, var(--chrome1), var(--chrome2) 40%, var(--chrome3) 72%, var(--chrome4));
      border:1px solid #0b1f44;
      border-radius:10px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      overflow:hidden;
    }

    .titlebar{
      height:26px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 5px 0 7px;
      background:linear-gradient(180deg, var(--title1), var(--title2));
      border-bottom:1px solid #0a1a3f;
      font-size:12px;
      user-select:none;
    }

    .title-left{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }

    .app-icon{
      width:12px;
      height:12px;
      border:1px solid #dbe8ff;
      border-radius:3px;
      background:linear-gradient(135deg, #ffffff, #9fc2ff 45%, #3567c5 100%);
    }

    .title-text{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:bold;
      text-shadow:0 1px 0 rgba(0,0,0,.35);
    }

    .window-controls{
      display:flex;
      gap:3px;
    }

    .wc{
      width:18px;
      height:18px;
      border:1px solid #17356d;
      border-radius:4px;
      background:linear-gradient(180deg, #cfe0ff, #87a8e9);
      color:#17305f;
      font:700 12px/16px Arial, sans-serif;
      text-align:center;
      padding:0;
      cursor:pointer;
    }
    
    .wc:hover{
      background:linear-gradient(180deg, #ffffff, #b3cbff);
    }

    .menu{
      display:flex;
      gap:10px;
      padding:2px 7px 3px;
      background:linear-gradient(180deg, #d9e6fb, #bfd0f4);
      color:#162c57;
      font-size:11px;
      border-bottom:1px solid #6d8fcb;
      user-select:none;
      flex-wrap:wrap;
    }
    
    .menu div{
      cursor:pointer;
      padding:0 3px;
    }
    
    .menu div:hover{
      background:#3a62b0;
      color:#fff;
      border-radius:2px;
    }

    .screen-wrap{
      padding:6px;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .screen{
      position:relative;
      flex:1;
      min-height:0;
      background:#000;
      border:1px solid #d7e3ff;
      border-radius:6px;
      box-shadow:inset 0 0 0 1px #10295a;
      overflow:hidden;
    }

    .screen img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#000;
    }

    .overlay{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:12px 15px;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.85));
      font-size:14px;
      line-height:1.25;
      text-shadow:1px 1px 2px #000;
    }

    .statusbar{
      height:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      color:#eef4ff;
      background:linear-gradient(180deg, #304f97, #213e7d);
      border-top:1px solid #95b3ef;
      border-bottom:1px solid #142d5f;
      border-radius:0 0 6px 6px;
    }

    .controls{
      padding:8px 10px 10px;
      background:linear-gradient(180deg, #87a5e0, #5f85ca 55%, #4b6eb8);
      border-top:1px solid #b5c8f2;
      display:grid;
      grid-template-rows:auto auto;
      gap:10px;
    }

    .big-controls{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:6px;
    }

    .btn{
      border:1px solid #183b7a;
      border-radius:6px;
      background:linear-gradient(180deg, #edf3ff, #afc6ee 55%, #7c9ddc);
      color:#16315e;
      font-size:14px;
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
      min-height:38px;
      width:100%;
      display:grid;
      place-items:center;
      padding:0;
    }

    .btn.play{
      font-size:18px;
      font-weight:bold;
    }

    .btn:active{transform:translateY(1px)}
    .btn:hover{background:linear-gradient(180deg, #ffffff, #c2d5f5 55%, #9cb8ed);}

    .bottom-row{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:end;
    }

    .seek-wrap{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .label{
      font-size:10px;
      color:#eef4ff;
      text-shadow:0 1px 0 #17305f;
    }

    .seek{
      width:100%;
      height:14px;
      border:1px solid #183b7a;
      border-radius:999px;
      background:#d1def5;
      position:relative;
      overflow:hidden;
      cursor:pointer;
    }

    .seek-bar{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:0%;
      background:linear-gradient(180deg, #91f8ff, #4da2ff);
      border-radius:999px 0 0 999px;
      transition:width 0.1s linear;
    }

    .hint{
      font-size:10px;
      color:#dfe8ff;
      text-align:right;
      white-space:nowrap;
      align-self:center;
    }

    @media (max-width: 700px){
      .player{
        width:100vw;
        height:100vh;
        border-radius:0;
      }
      .screen{
        border-radius:4px;
      }
      .big-controls{
        grid-template-columns:1fr;
      }
      .bottom-row{
        grid-template-columns:1fr;
      }
      .hint{
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="titlebar">
      <div class="title-left">
        <div class="app-icon"></div>
        <div class="title-text">Windows Media Player</div>
      </div>
      <div class="window-controls">
        <div class="wc" onclick="alert('Minimize functionality')">_</div>
        <div class="wc" onclick="alert('Maximize functionality')">□</div>
        <div class="wc" onclick="window.location.href='../pages/still love u.html'">×</div>
      </div>
    </div>

    <div class="menu">
      <div>File</div>
      <div>View</div>
      <div>Play</div>
      <div>Tools</div>
      <div>Help</div>
    </div>

    <div class="screen-wrap">
      <div class="screen">
        <img id="cover" alt="Movie cover">
        <div class="overlay" id="overlay"></div>
      </div>
      <div class="statusbar" id="statusbar">Ready</div>
    </div>

    <div class="controls">
      <div class="big-controls">
        <button class="btn" id="prevBtn" title="Previous Movie (Left Arrow)">⏮</button>
        <button class="btn play" id="playBtn" title="Play / Pause (Spacebar)">▶</button>
        <button class="btn" id="nextBtn" title="Next Movie (Right Arrow)">⏭</button>
      </div>
      <div class="bottom-row">
        <div class="seek-wrap">
          <div class="label" id="trackLabel">Playback Progress</div>
          <div class="seek" id="seekBar" aria-label="playback seek bar">
            <div class="seek-bar" id="progressBar"></div>
          </div>
        </div>
        <div class="hint">Use Arrow keys & Spacebar to control</div>
      </div>
    </div>
  </div>

  <script>
    const movies = [
      { title: "H2O", year: "2015", cover: "../images/movie covers/h2o.jpg" },
      { title: "Nimona", year: "2023", cover: "../images/movie covers/nimona.jpg" },
      { title: "Umbrella Academy", year: "2019", cover: "../images/movie covers/umbrella_academy.jpg" },
      { title: "Wendell & Wild", year: "2022", cover: "../images/movie covers/wendell_and_wild.jpg" },
      { title: "Dracula: Series", year: "2022", cover: "../images/movie covers/dracula.jpg" },
      { title: "Van Helsing", year: "2004", cover: "../images/movie covers/van_helsing.jpg" },
      { title: "Das Labyrinth", year: "1986", cover: "../images/movie covers/das_labyrinth.jpg" }, 
      { title: "Edward Scissorhands", year: "1990", cover: "../images/movie covers/edward_scissorhands.jpg" },
      { title: "Frankenweenie", year: "2012", cover: "../images/movie covers/frankenweenie.jpg" },
      { title: "Miss Peregrine's Home for Peculiar Children", year: "2016", cover: "../images/movie covers/miss_peregrines.jpg" },
      { title: "Sleepy Hollow", year: "1999", cover: "../images/movie covers/sleepy_hollow.jpg" },
      { title: "Beetlejuice", year: "1988", cover: "../images/movie covers/beetlejuice.jpg" },
      { title: "Sweeney Todd", year: "2007", cover: "../images/movie covers/sweeney_todd.jpg" }
    ];

    const cover = document.getElementById("cover");
    const overlay = document.getElementById("overlay");
    const statusbar = document.getElementById("statusbar");
    const prevBtn = document.getElementById("prevBtn");
    const playBtn = document.getElementById("playBtn");
    const nextBtn = document.getElementById("nextBtn");
    const seekBar = document.getElementById("seekBar");
    const progressBar = document.getElementById("progressBar");
    const trackLabel = document.getElementById("trackLabel");

    let current = 0;
    let playing = false;
    let progressInterval = null;
    let currentProgress = 0;

    function updatePlayer() {
      const movie = movies[current];
      cover.src = movie.cover;
      cover.alt = movie.title;
      overlay.innerHTML = `<strong>${movie.title}</strong> (${movie.year})`;
      
      if (playing) {
        statusbar.textContent = `Playing: ${movie.title}`;
        playBtn.textContent = "❚❚";
        startProgress();
      } else {
        statusbar.textContent = "Paused";
        playBtn.textContent = "▶";
        stopProgress();
      }
    }

    function startProgress() {
      stopProgress();
      progressInterval = setInterval(() => {
        if (currentProgress >= 100) {
          currentProgress = 0;
          nextBtn.click();
        } else {
          currentProgress += 0.5;
          progressBar.style.width = `${currentProgress}%`;
          trackLabel.textContent = `Playback Progress: ${Math.floor(currentProgress)}%`;
        }
      }, 100);
    }

    function stopProgress() {
      clearInterval(progressInterval);
    }

    seekBar.addEventListener("click", (e) => {
      const rect = seekBar.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const width = rect.width;
      currentProgress = (clickX / width) * 100;
      progressBar.style.width = `${currentProgress}%`;
      trackLabel.textContent = `Playback Progress: ${Math.floor(currentProgress)}%`;
    });

    prevBtn.addEventListener("click", () => {
      currentProgress = 0;
      progressBar.style.width = "0%";
      current = (current - 1 + movies.length) % movies.length;
      updatePlayer();
    });

    nextBtn.addEventListener("click", () => {
      currentProgress = 0;
      progressBar.style.width = "0%";
      current = (current + 1) % movies.length;
      updatePlayer();
    });

    playBtn.addEventListener("click", () => {
      playing = !playing;
      updatePlayer();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") prevBtn.click();
      if (e.key === "ArrowRight") nextBtn.click();
      if (e.key === " ") {
        e.preventDefault();
        playBtn.click();
      }
    });

    updatePlayer();
    statusbar.textContent = "Ready";
  </script>
</body>
</html>
