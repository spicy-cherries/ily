    <div class="gallery-controls">
        <button class="nav-btn" id="prevBtn">← Spin Left</button>
        <button class="nav-btn" id="nextBtn">Spin Right →</button>
    </div>

    <script>
        function updateZIndices(book) {
            const bookLeaves = book.querySelectorAll('.book-leaf');
            bookLeaves.forEach((leaf, index) => {
                if (leaf.classList.contains('flipped')) {
                    leaf.style.zIndex = 10 + index;
                } else {
                    leaf.style.zIndex = bookLeaves.length - index;
                }
            });
        }

        document.querySelectorAll('.book').forEach(book => updateZIndices(book));

        document.querySelectorAll('.book-leaf').forEach((leaf) => {
            leaf.addEventListener('click', function(e) {
                const wrapper = this.closest('.book-wrapper');
                if (!wrapper.classList.contains('front-focus')) return;

                const parentBook = this.closest('.book');
                const allLeaves = Array.from(parentBook.querySelectorAll('.book-leaf'));
                const leafIndex = allLeaves.indexOf(this);

                if (!this.classList.contains('flipped')) {
                    const canFlipForward = allLeaves.slice(0, leafIndex).every(l => l.classList.contains('flipped'));
                    if (canFlipForward) {
                        this.classList.add('flipped');
                    }
                } else {
                    const canFlipBackward = allLeaves.slice(leafIndex + 1).every(l => !l.classList.contains('flipped'));
                    if (canFlipBackward) {
                        this.classList.remove('flipped');
                    }
                }

                setTimeout(() => updateZIndices(parentBook), 150);
                e.stopPropagation();
            });
        });

        const ring = document.getElementById('carouselRing');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const wrappers = document.querySelectorAll('.book-wrapper');
        
        let currentRotation = -240; 
        let activeIndex = 3; 

        function updateCarouselClasses() {
            wrappers.forEach((wrap, idx) => {
                if (idx === activeIndex) {
                    wrap.classList.add('front-focus');
                } else {
                    wrap.classList.remove('front-focus');
                }
            });
        }

        updateCarouselClasses();

        nextBtn.addEventListener('click', () => {
            currentRotation -= 120; 
            activeIndex = (activeIndex + 1) % wrappers.length;
            ring.style.transform = `translateZ(-700px) rotateY(${currentRotation}deg)`;
            updateCarouselClasses();
        });

        prevBtn.addEventListener('click', () => {
            currentRotation += 120;
            activeIndex = (activeIndex - 1 + wrappers.length) % wrappers.length;
            ring.style.transform = `translateZ(-700px) rotateY(${currentRotation}deg)`;
            updateCarouselClasses();
        });
    </script>
