        function readOracleCard() {
            console.log("Oracle button pressed successfully.");
            
            const inputField = document.getElementById('user-question');
            const cardDisplay = document.getElementById('oracle-card-display');
            
            const cardImg = document.getElementById('card-image');
            const cardTitle = document.getElementById('card-title');
            const cardReading = document.getElementById('card-reading');

            if (!inputField || !cardDisplay || !cardImg || !cardTitle || !cardReading) {
                alert("Missing HTML items. Please ensure you copied the entire file code!");
                return;
            }

            const questionText = inputField.value.trim();

            if (questionText === "") {
                return;
            }

            const randomIndex = Math.floor(Math.random() * tarotDeck.length);
            const drawn = tarotDeck[randomIndex];

            cardTitle.innerText = drawn.title;
            cardReading.innerText = drawn.text;
            cardImg.src = `tarot-cards/${drawn.image}`;

            cardDisplay.style.setProperty('display', 'flex', 'important');
            
            inputField.value = "";
        }
