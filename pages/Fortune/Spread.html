        function drawThreeCardSpread() {
            const positions = ['past', 'present', 'future'];
            
            // Clone deck array to avoid pulling the exact same card twice in one spread
            let temporaryDeck = [...tarotDeck];

            positions.forEach(pos => {
                const innerBox = document.getElementById(`inner-${pos}`);
                innerBox.style.transform = "none"; // Reset
            });
            // Brief timeout allowing animations to settle back down
            setTimeout(() => {
                positions.forEach(pos => {
                    if (temporaryDeck.length === 0) return;

                    // Pull a random index and remove it from our active pool
                    const randomIndex = Math.floor(Math.random() * temporaryDeck.length);
                    const drawnCard = temporaryDeck.splice(randomIndex, 1)[0];

                    // Inject values directly into targeted timeline node templates
                    document.getElementById(`img-${pos}`).src = `tarot-cards/${drawnCard.image}`;
                    document.getElementById(`title-${pos}`).innerText = drawnCard.title;
                    document.getElementById(`text-${pos}`).innerText = drawnCard.text;

                    // Trigger unique staggered flip times for visual flare
                    setTimeout(() => {
                        document.getElementById(`inner-${pos}`).style.transform = "rotateY(180deg)";
                    }, pos === 'past' ? 100 : pos === 'present' ? 350 : 600);
                });
            }, 200);
        }
